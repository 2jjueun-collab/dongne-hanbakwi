<!doctype html><html lang="ko"><head><meta charset="utf-8"><style>
body{font-family:sans-serif;background:#eef6ef;margin:0;padding:20px}.grid{display:grid;grid-template-columns:repeat(4,220px);gap:18px}.card{background:white;border-radius:18px;padding:12px;text-align:center}.character{position:relative;width:190px;height:250px;margin:auto}.hagom-base{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:4}.equipped-item{position:absolute;left:var(--item-x);top:var(--item-y);width:var(--item-width);aspect-ratio:1;transform:translate(-50%,-50%) rotate(var(--item-rotate));z-index:7;filter:drop-shadow(0 3px 2px white)}.equipped-item img{width:100%;height:100%;object-fit:contain}.label{font-weight:800;margin-top:8px}
</style></head><body><div class="grid" id="grid"></div><script type="module">
import {CHARACTER, LANDMARKS, HIDDEN_GACHA_ITEMS} from './data.js';
const all=[...LANDMARKS.flatMap(x=>x.rewards),...HIDDEN_GACHA_ITEMS];
const ids=['yu-jacket','market-apron','hidden-galaxy-apron','hidden-cloud-cape'];
const grid=document.querySelector('#grid');
for(const id of ids){const item=all.find(x=>x.id===id); const p=item.placement; grid.innerHTML+=`<div class=card><div class=character><img class=hagom-base src="${CHARACTER.image}"><span class=equipped-item style="--item-x:${p.x}%;--item-y:${p.y}%;--item-width:${p.width}%;--item-rotate:${p.rotate}deg"><img src="${item.icon}"></span></div><div class=label>${item.name} / ${p.width}%</div></div>`}
</script></body></html>
